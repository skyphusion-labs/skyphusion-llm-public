name: Bug report
description: Something in the playground or Worker misbehaves
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: >
        Thanks for the report. This repo is the multimodal AI playground
        (Cloudflare Worker: chat, image / TTS / STT / video / music generation,
        RAG, projects, voice chat). Please do not paste secrets (API tokens,
        Cloudflare Access JWTs, .dev.vars).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What went wrong, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How to trigger it. Include the model or feature in use if relevant.
      placeholder: |
        1. Open the playground and ...
        2. ...
        3. See the error
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where
      options:
        - Chat playground (model chat)
        - Voice / conversational STT
        - Image / video / music generation
        - RAG / documents / projects
        - Auth (Cloudflare Access)
        - D1 / migrations
        - Deploy / wrangler / self-host setup
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: The app version (footer / package.json) or commit SHA.
      placeholder: "v0.163.0"
    validations:
      required: false
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - skyphusion.org (hosted)
        - My own self-hosted Worker
        - Local (wrangler dev)
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Logs / console / context
      description: Browser console, `wrangler tail` output, model id. Redact tokens.
      render: shell
    validations:
      required: false
