name: Feature request
description: Suggest a capability or improvement for the playground
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: >
        For the multimodal AI playground (chat, voice, generation, RAG,
        projects, and the Worker itself).
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that is hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you would like to see. Rough is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried or other approaches you weighed.
    validations:
      required: false
