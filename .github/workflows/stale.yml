name: Stale

# Gentle issue/PR lifecycle. Marks quiet threads stale after a while and closes
# them if still quiet, so the tracker reflects what is actually live. Anything
# labeled pinned/security/roadmap is exempt. Tune or remove to taste.

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 60
          days-before-close: 14
          exempt-issue-labels: "pinned,security,roadmap"
          exempt-pr-labels: "pinned,security,roadmap"
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been quiet for 60 days, so it is being marked stale.
            Comment to keep it open; otherwise it will close in 14 days. No
            offense meant, just keeping the tracker honest.
          stale-pr-message: >
            This pull request has been quiet for 60 days, so it is being marked
            stale. Push or comment to keep it open; otherwise it will close in
            14 days.
          close-issue-message: >
            Closing as stale. Reopen any time if it is still relevant; the door
            is open.
          close-pr-message: >
            Closing as stale. Reopen any time to pick the work back up.
