name = "skyphusion-llm"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# No scheduled tasks. The render-notify sweep that used a `*/3` cron (resolving
# fire-and-forget renders) moved to vivijure; the scheduled() handler was stripped
# from src/index.ts. An empty crons list is explicit on purpose: omitting the
# [triggers] block leaves a previously-deployed cron in place (wrangler only syncs
# triggers it can see), so this clears the stale schedule on the next deploy.
[triggers]
crons = []

# AI binding. The unified binding handles Workers AI models directly and routes
# third-party Unified Billing models (chat partners, video, music, proxied image)
# through the Cloudflare AI Gateway. Anthropic, xAI, and Google chat hit the
# gateway's per-provider endpoints keylessly via cf-aig-authorization.
[ai]
binding = "AI"

# D1 database for chat history. Fill in database_id after running:
#   npx wrangler d1 create skyphusion-llm
[[d1_databases]]
binding = "DB"
database_name = "skyphusion-llm"
database_id = "PLACEHOLDER_RUN_wrangler_d1_create_THEN_PASTE_HERE"

# R2 bucket for input + output artifacts (images, audio, video frames).
# Create with:
#   npx wrangler r2 bucket create skyphusion-llm
[[r2_buckets]]
binding = "R2"
bucket_name = "skyphusion-llm"

# Vectorize index for RAG document embeddings. 768 dimensions matches
# @cf/baai/bge-base-en-v1.5; cosine similarity.
# Create with:
#   npx wrangler vectorize create skyphusion-llm-vec --dimensions=768 --metric=cosine
[[vectorize]]
binding = "VEC"
index_name = "skyphusion-llm-vec"

# Static frontend (HTML, CSS, JS).
[assets]
directory = "./public"
binding = "ASSETS"

# Cloudflare Workflow for long-running Unified Billing video and music gen
# (v0.12.0). env.AI.run for these models blocks until completion (30s-3min),
# which exceeds the ~30s waitUntil budget after an HTTP response. Workflows
# provide a durable execution primitive: the LongRunWorkflow class invokes the
# model, downloads the result, uploads to R2, and finalizes the D1 row across
# independently-retryable steps. Each instance is observable in the Cloudflare
# dashboard.
[[workflows]]
name = "skyphusion-longrun"
binding = "LONGRUN"
class_name = "LongRunWorkflow"

# v0.108.0: per-session DO wrapping a @cf/deepgram/flux conversational STT
# WebSocket; persists the final transcript to /history on close. Source:
# src/stt-session.ts.
[[durable_objects.bindings]]
name = "STT_SESSION"
class_name = "SttSession"

# Migration history (v1-v6): all tags are cursor-advance-only for new deployments.
#
# The live skyphusion-llm worker was built up incrementally via direct CF API calls
# and out-of-band dashboard ops, NOT purely through wrangler migration tags. By the
# time wrangler.example.toml was introduced as a deploy template, the live worker
# already had:
#   - SttSession DO namespace registered with use_sqlite=true (v3 intent applied)
#   - AudioBeatSyncContainer, ImagePrepContainer, VideoFinishContainer DO namespaces
#     deleted (v5 intent applied)
#
# Wrangler tracks migration cursor server-side. If the cursor is behind v6, trying
# to apply any of v1-v5 fails: new_sqlite_classes errors on existing instances
# (code 10074), and deleted_classes errors because those classes are no longer
# exported in the current script (also 10074). All tags below are therefore
# cursor-advance-only -- zero DO operations -- so wrangler skips past them cleanly
# to v6 regardless of where the cursor sits. DO state is correct on the live worker;
# these tags just bring the cursor in sync. (v0.164.2)
[[migrations]]
tag = "v1"

[[migrations]]
tag = "v2"

[[migrations]]
tag = "v3"

[[migrations]]
tag = "v4"

[[migrations]]
tag = "v5"

[[migrations]]
tag = "v6"

# Per-instance observability for the worker (lets you tail logs in the
# dashboard). Workflows have their own dashboard surface; this enables it
# for the rest of the worker too.
[observability]
enabled = true

# Note: GATEWAY_ID is set as a worker secret rather than a var in this file
# (v0.12.0+). This keeps deployer-specific values out of the committed template.
# Set it once after first deploy:
#   echo "your-gateway-slug" | npx wrangler secret put GATEWAY_ID
# For local development, also add it to .dev.vars:
#   GATEWAY_ID=your-gateway-slug
#
# Public demo mode (v0.164.0+): omit GATEWAY_ID and CF_AIG_TOKEN on the worker.
# Each visitor stores their own gateway slug + token via Account > AI Gateway
# (/api/prefs in D1 user_prefs). You still need Cloudflare Access in front.
#
# Other worker secrets (also set via `npx wrangler secret put <NAME>`):
#   CF_AIG_TOKEN (required for Anthropic, xAI, OpenAI chat, Google, and proxied
#                 image/video/music on Unified Billing when using worker-level
#                 credentials; optional in public demo mode where users supply
#                 their own token via /api/prefs; v0.93.0+),
#   OPENAI_API_KEY (optional, v0.22.1; ONLY for openai/gpt-image-1.5 transparent
#                   image output via a direct OpenAI call. Without it that model
#                   falls back to opaque via Unified Billing. OpenAI chat does
#                   NOT use this; it rides Unified Billing. This is the only
#                   deployer BYOK secret.),
#   TAVILY_API_KEY (optional, v0.17.0; Tavily web-search source. Skipped when unset),
#   BRAVE_API_KEY (optional, v0.164.0; Brave Search web-search source. Skipped when unset).
