name = "skyphusion-llm-public"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# AI binding. The unified binding handles Workers AI models directly and routes
# third-party Unified Billing models (video and music partners) through the
# Cloudflare AI Gateway. Anthropic (Unified Billing) and xAI (BYOK) bypass the
# binding and hit the gateway's per-provider endpoints with a worker token/key.
[ai]
binding = "AI"

# D1 database for chat history. Fill in database_id after running:
#   npx wrangler d1 create skyphusion-llm-public
[[d1_databases]]
binding = "DB"
database_name = "skyphusion-llm-public"
database_id = "PLACEHOLDER_RUN_wrangler_d1_create_THEN_PASTE_HERE"

# R2 bucket for input + output artifacts (images, audio, video frames).
# Create with:
#   npx wrangler r2 bucket create skyphusion-llm-public
[[r2_buckets]]
binding = "R2"
bucket_name = "skyphusion-llm-public"

# v0.39.1: separate bucket for storyboard / render artifacts. The
# vivijure-serverless GPU worker writes bundles, renders, and project
# state tarballs to whatever bucket its own R2_BUCKET env var names;
# this binding lets the Worker read them back through /api/artifact
# and the /api/storyboard/* routes. Keeps the chat-side artifacts on
# `R2` untouched. Point both bindings at the same bucket if you do
# not want the split.
# Create with:
#   npx wrangler r2 bucket create skyphusion-llm-renders
[[r2_buckets]]
binding = "R2_RENDERS"
bucket_name = "skyphusion-llm-renders"

# Vectorize index for RAG document embeddings. 768 dimensions matches
# @cf/baai/bge-base-en-v1.5; cosine similarity.
# Create with:
#   npx wrangler vectorize create skyphusion-llm-vec --dimensions=768 --metric=cosine
[[vectorize]]
binding = "VEC"
index_name = "skyphusion-llm-vec"

# Static frontend (HTML, CSS, JS).
[assets]
directory = "./public"
binding = "ASSETS"

# Cloudflare Workflow for long-running Unified Billing video and music gen
# (v0.12.0). env.AI.run for these models blocks until completion (30s-3min),
# which exceeds the ~30s waitUntil budget after an HTTP response. Workflows
# provide a durable execution primitive: the LongRunWorkflow class invokes the
# model, downloads the result, uploads to R2, and finalizes the D1 row across
# independently-retryable steps. Each instance is observable in the Cloudflare
# dashboard.
[[workflows]]
name = "skyphusion-longrun"
binding = "LONGRUN"
class_name = "LongRunWorkflow"

# v0.107.0: CPU-only librosa audio beat-sync container. The Worker presigns an
# R2 GET URL and POSTs it to the container's /analyze. Source lives at
# containers/audio-beat-sync/. Uses new_sqlite_classes per the official CF
# container template.
[[durable_objects.bindings]]
name = "AUDIO_BEAT_SYNC"
class_name = "AudioBeatSyncContainer"

[[containers]]
class_name = "AudioBeatSyncContainer"
image = "./containers/audio-beat-sync/Dockerfile"
max_instances = 3
instance_type = "standard"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AudioBeatSyncContainer"]

# Per-instance observability for the worker (lets you tail logs in the
# dashboard). Workflows have their own dashboard surface; this enables it
# for the rest of the worker too.
[observability]
enabled = true

# Note: GATEWAY_ID is set as a worker secret rather than a var in this file
# (v0.12.0+). This keeps deployer-specific values out of the committed template.
# Set it once after first deploy:
#   echo "your-gateway-slug" | npx wrangler secret put GATEWAY_ID
# For local development, also add it to .dev.vars:
#   GATEWAY_ID=your-gateway-slug
#
# Other worker secrets (also set via `npx wrangler secret put <NAME>`):
#   XAI_API_KEY (xAI BYOK chat),
#   CF_AIG_TOKEN (required for Anthropic Unified Billing, and for any gateway
#                 with Authenticated Gateway enabled; v0.93.0 dropped the
#                 Anthropic BYOK key in favor of this),
#   OPENAI_API_KEY (optional, v0.22.1; ONLY for openai/gpt-image-1.5 transparent
#                   image output via a direct OpenAI call. Without it that model
#                   falls back to opaque via Unified Billing. OpenAI chat does
#                   NOT use this; it rides Unified Billing.),
#   TAVILY_API_KEY (optional, v0.17.0; for the web-search retrieval source.
#                   When unset, web search falls back to Wikipedia only).
